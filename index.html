<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess Who</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div id="app">

    <!-- Home: join-with-code OR create. No name field here (that's the next step). -->
    <section class="screen" id="screen-landing" data-active="true">
      <div class="card">
        <h1 class="title">Guess Who</h1>
        <p class="tagline">A party game for you and your friends.</p>

        <div class="join-block">
          <span class="field-label">Have a room code?</span>
          <div class="join-row">
            <input id="code-input" class="input input-code" type="text" maxlength="4"
                   placeholder="CODE" autocomplete="off" spellcheck="false" />
            <button class="btn btn-primary" id="join-btn" type="button">Join</button>
          </div>
        </div>

        <div class="divider"><span>or</span></div>

        <button class="btn btn-ghost btn-block" id="create-btn" type="button">Create a room</button>

        <p class="error" id="landing-error" hidden></p>
      </div>
    </section>

    <!-- Name step: reached after choosing create or join -->
    <section class="screen" id="screen-name">
      <div class="card">
        <button class="back-link" id="name-back" type="button">← Back</button>
        <h2 class="screen-title" id="name-context">Your name</h2>

        <label class="field">
          <span class="field-label">Your name</span>
          <input id="name-input" class="input" type="text" maxlength="40"
                 placeholder="e.g. Mary Jane" autocomplete="off" />
        </label>

        <button class="btn btn-primary btn-block" id="confirm-btn" type="button">Continue</button>
        <p class="error" id="name-error" hidden></p>
      </div>
    </section>

    <!-- Lobby: shareable code + live player list; host can start -->
    <section class="screen" id="screen-lobby">
      <div class="card">
        <p class="lobby-eyebrow">Room code</p>
        <div class="code-display" id="code-display">····</div>
        <button class="btn btn-tiny" id="copy-link-btn" type="button">Copy invite link</button>

        <h2 class="lobby-heading">Players</h2>
        <ul class="player-list" id="player-list"></ul>

        <div class="actions">
          <button class="btn btn-primary btn-block" id="start-btn" type="button" hidden>Start game</button>
          <p class="waiting" id="waiting-note" hidden>Waiting for the host to start…</p>
        </div>
      </div>
    </section>

    <!-- Deck building: everyone adds characters (name + photo); board syncs live -->
    <section class="screen" id="screen-deck">
      <div class="deck-layout">
        <header class="deck-header">
          <div>
            <p class="lobby-eyebrow">Room <span id="deck-code"></span></p>
            <h2 class="deck-title">Build the board</h2>
            <p class="deck-sub">Everyone adds the people they know — they appear for all players live.</p>
          </div>
          <button class="btn btn-primary" id="deck-continue-btn" type="button" hidden>Continue</button>
        </header>

        <form class="add-character" id="add-character-form">
          <input id="char-name" class="input" type="text" maxlength="40"
                 placeholder="Character name" autocomplete="off" />
          <img id="photo-preview" class="photo-preview" alt="" hidden />
          <label class="btn btn-ghost photo-btn" id="photo-picker">
            <input id="char-photo" type="file" accept="image/*" hidden />
            <span id="photo-label">📷 Photo</span>
          </label>
          <button class="btn btn-primary" id="add-char-btn" type="submit">Add</button>
        </form>
        <p class="error" id="deck-error" hidden></p>

        <div class="board-grid" id="board-grid"></div>
        <p class="board-empty" id="board-empty">No characters yet — add the first one!</p>
      </div>
    </section>

  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
